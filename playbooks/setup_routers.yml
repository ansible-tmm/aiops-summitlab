---
- name: Resolve router IPs
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Resolve cisco-rtr1 IP via system resolver
      ansible.builtin.shell: getent hosts {{ hostvars['cisco-rtr1']['ansible_host'] }} | awk '{print $1}'
      register: _rtr1_ip
      changed_when: false

    - name: Resolve cisco-rtr2 IP via system resolver
      ansible.builtin.shell: getent hosts {{ hostvars['cisco-rtr2']['ansible_host'] }} | awk '{print $1}'
      register: _rtr2_ip
      changed_when: false

    - name: Resolve bastion IP via system resolver
      ansible.builtin.shell: getent ahosts bastion | awk '/STREAM/{print $1; exit}'
      register: _bastion_ip
      changed_when: false

    - name: Store resolved IPs
      ansible.builtin.set_fact:
        rtr1_ip: "{{ _rtr1_ip.stdout }}"
        rtr2_ip: "{{ _rtr2_ip.stdout }}"
        bastion_resolved_ip: "{{ _bastion_ip.stdout }}"

- name: Setup two routers for OSPF
  hosts:
   - cisco-rtr1
   - cisco-rtr2
  gather_facts: false
  vars:
    bastion_ip: "{{ hostvars['localhost']['bastion_resolved_ip'] }}"
    rtr1_ip: "{{ hostvars['localhost']['rtr1_ip'] }}"
    rtr2_ip: "{{ hostvars['localhost']['rtr2_ip'] }}"

  tasks:

  - name: Setup cisco-1
    cisco.ios.config:
     src: ../templates/cisco-1.j2
     save_when: always
    when: inventory_hostname == 'cisco-rtr1'

  - name: Setup cisco-2
    cisco.ios.config:
     src: ../templates/cisco-2.j2
     save_when: always
    when: inventory_hostname == 'cisco-rtr2'
