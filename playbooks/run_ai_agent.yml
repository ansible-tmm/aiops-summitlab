---
# Run the CrewAI incident agent on bastion and notify Mattermost.
# Expected extra_vars:
#   problem: "Apache web server is down on node1"
#   agent_mode: "all"  (triage|execute|report|all)
- name: AI Agent - Incident Response
  hosts: bastion
  gather_facts: false
  become: true
  become_user: "{{ agent_user | default('lab-user') }}"

  vars:
    problem: "Apache web server is down on node1"
    agent_mode: "all"
    agent_user: "lab-user"
    agent_home: "/home/{{ agent_user }}"
    agent_script: "{{ agent_home }}/agentic-aiops/incident_agent.py"
    agent_venv: "{{ agent_home }}/.venv/bin"
    mattermost_instance: ""
    mattermost_token: ""

  tasks:
    - name: Run incident agent
      ansible.builtin.shell: |
        source {{ agent_home }}/.bashrc
        {{ agent_venv }}/python3 {{ agent_script }} {{ agent_mode }} "{{ problem }}"
      args:
        executable: /bin/bash
      register: agent_output
      changed_when: true
      timeout: 600

    - name: Display agent output
      ansible.builtin.debug:
        msg: "{{ agent_output.stdout }}"

    - name: Extract agent result section
      ansible.builtin.set_fact:
        agent_result: >-
          {%- set ns = namespace(capture=false, lines=[]) -%}
          {%- for line in agent_output.stdout_lines -%}
            {%- if line | trim == 'RESULT' -%}
              {%- set ns.capture = true -%}
            {%- elif ns.capture and '===' not in line and line | trim | length > 0 -%}
              {%- set _ = ns.lines.append(line) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.lines | join('\n') if ns.lines | length > 0 else agent_output.stdout_lines[-10:] | join('\n') }}

    - name: Notify Mattermost with agent results
      community.general.mattermost:
        url: "{{ mattermost_instance }}"
        api_key: "{{ mattermost_token }}"
        attachments:
          - text: "{{ agent_result }}"
            color: "{{ '#36a64f' if 'resolved' in agent_result | lower or 'successful' in agent_result | lower else '#cc0000' }}"
            title: "AI Agent Incident Report"
            fields:
              - title: Problem
                value: "{{ problem }}"
                short: true
              - title: Mode
                value: "{{ agent_mode }}"
                short: true
      delegate_to: localhost
      become: false
      when:
        - mattermost_instance | default('') | trim != ''
        - mattermost_token | default('') | trim != ''
