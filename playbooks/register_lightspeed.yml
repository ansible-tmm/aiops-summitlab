---
- name: Register with Red Hat Lightspeed
  hosts: all
  become: true
  tasks:
    - name: Extract sandbox ID from hostname
      ansible.builtin.set_fact:
        sandbox_id: "{{ ansible_fqdn | regex_search('sandbox-([a-z0-9]+)-', '\\1') | default(['unknown'], true) | first }}"

    - name: Display sandbox ID
      ansible.builtin.debug:
        msg: "Sandbox ID for this lab: {{ sandbox_id }}"

    - name: Check current RHSM identity
      ansible.builtin.command:
        cmd: subscription-manager identity
      register: rhsm_identity
      changed_when: false
      failed_when: false

    - name: Display current RHSM account
      ansible.builtin.debug:
        msg: "{{ rhsm_identity.stdout_lines | default(['Not registered']) }}"

    - name: Unregister insights-client from old account
      ansible.builtin.command:
        cmd: insights-client --unregister
      failed_when: false
      changed_when: true

    - name: Unregister from current RHSM account
      community.general.redhat_subscription:
        state: absent

    - name: Clean subscription-manager state
      ansible.builtin.command:
        cmd: subscription-manager clean
      changed_when: true

    - name: Register with correct Red Hat account
      community.general.redhat_subscription:
        state: present
        username: "{{ scm_username }}"
        password: "{{ scm_password }}"
        auto_attach: true
        force_register: true

    - name: Verify RHSM registration
      ansible.builtin.command:
        cmd: subscription-manager identity
      register: rhsm_verify
      changed_when: false

    - name: Display new RHSM account info
      ansible.builtin.debug:
        msg: "{{ rhsm_verify.stdout_lines }}"

    - name: Install insights-client
      ansible.builtin.dnf:
        name: insights-client
        state: present

    - name: Write custom tags for lab grouping
      ansible.builtin.copy:
        dest: /etc/insights-client/tags.yaml
        mode: "0644"
        content: |
          group: {{ sandbox_id }}
          lab_id: {{ sandbox_id }}
          environment: summit-lab

    - name: Register with Lightspeed and assign group
      ansible.builtin.command:
        cmd: "insights-client --register --group={{ sandbox_id }}"
      register: register_result
      changed_when: "'Successfully registered' in register_result.stdout"

    - name: Verify registration status
      ansible.builtin.command:
        cmd: insights-client --status
      register: status_result
      changed_when: false

    - name: Display registration status
      ansible.builtin.debug:
        msg:
          - "Registration: {{ status_result.stdout_lines }}"
          - "Group/Tag: {{ sandbox_id }}"
