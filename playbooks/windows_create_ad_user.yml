---
- name: Create Local User Account to Trigger Event ID 4722
  hosts: all
  gather_facts: false
  tasks:
    - name: Generate unique username
      ansible.builtin.set_fact:
        test_username: "TestUser-{{ lookup('pipe', 'date +%s') | hash('md5') | truncate(6, True, '') }}"

    - name: Create a test local user account
      ansible.windows.win_user:
        name: "{{ test_username }}"
        password: "P@ssw0rd123!"
        state: present
        password_never_expires: true
        groups:
          - Users
      register: user_result

    - name: Display created user info
      ansible.builtin.debug:
        msg: "Created local user: {{ test_username }} - Event ID 4720/4722 should now be in the Security log"
