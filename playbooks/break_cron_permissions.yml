---
- name: Break cron with invalid user
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Create crontab with nonexistent user
      ansible.builtin.copy:
        content: "* * * * * nonexistent_user /bin/true\n"
        dest: /etc/cron.d/bad-user-job
        owner: root
        group: root
        mode: "0644"

    - name: Display status
      ansible.builtin.debug:
        msg: "Cron job with nonexistent user written to /etc/cron.d/bad-user-job on {{ inventory_hostname }}. crond will log ERROR every minute."
