---
- name: Simulate Suspicious Firewall Rule Change
  hosts: all
  gather_facts: false
  tasks:
    - name: Add suspicious inbound firewall rule
      ansible.windows.win_shell: |
        New-NetFirewallRule -DisplayName "LabTestRule-AIOps" `
          -Direction Inbound `
          -Action Allow `
          -Protocol TCP `
          -LocalPort 9999 `
          -Description "AIOps lab test rule"
      register: add_result

    - name: Wait for event to be logged
      ansible.builtin.pause:
        seconds: 5

    - name: Remove the firewall rule
      ansible.windows.win_shell: |
        Remove-NetFirewallRule -DisplayName "LabTestRule-AIOps"
      register: remove_result

    - name: Display result
      ansible.builtin.debug:
        msg: "Firewall rule added and removed. Events 2004 and 2005 should now be in the Windows Event Log."
