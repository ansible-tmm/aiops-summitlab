---
# Creates the Cron-AIOps-Workflow in AAP.
# Node 1: AI Router analyzes syslog alert and selects the correct fix
# Node 2: Approval gate for human review
# Node 3: Dispatcher launches the AI-selected fix JT
- name: Create Cron AIOps Workflow
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Delete existing workflow if present
      ansible.controller.workflow_job_template:
        name: "Cron-AIOps-Workflow"
        organization: "Default"
        state: absent

    - name: Create Cron AIOps Workflow Template
      ansible.controller.workflow_job_template:
        name: "Cron-AIOps-Workflow"
        description: "AI-driven cron remediation: route alert to correct fix via LLM"
        organization: "Default"
        inventory: "lab-inventory"
        ask_variables_on_launch: true
        state: present

    - name: Add AI Router node
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Cron-AIOps-Workflow"
        organization: "Default"
        identifier: "ai_router"
        unified_job_template: "AI Route Cron Remediation"
        state: present

    - name: Add Approval node
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Cron-AIOps-Workflow"
        organization: "Default"
        identifier: "approval_gate"
        approval_node:
          name: "Review AI Routing Decision"
          description: "Review the AI-selected cron fix before applying"
          timeout: 900
        state: present

    - name: Add Dispatch node
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Cron-AIOps-Workflow"
        organization: "Default"
        identifier: "dispatch_fix"
        unified_job_template: "Dispatch Cron Remediation"
        state: present

    - name: Link AI Router to Approval on success
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Cron-AIOps-Workflow"
        organization: "Default"
        identifier: "ai_router"
        unified_job_template: "AI Route Cron Remediation"
        success_nodes:
          - "approval_gate"
        state: present

    - name: Link Approval to Dispatch on success
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Cron-AIOps-Workflow"
        organization: "Default"
        identifier: "approval_gate"
        approval_node:
          name: "Review AI Routing Decision"
          description: "Review the AI-selected cron fix before applying"
          timeout: 900
        success_nodes:
          - "dispatch_fix"
        state: present

    - name: Display workflow creation status
      ansible.builtin.debug:
        msg: >-
          Cron-AIOps-Workflow created with 3 nodes:
          AI Router -> Approval Gate -> Dispatch Remediation
