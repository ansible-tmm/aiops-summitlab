---
# EDA Rulebook: RHEL Cron Service
# Listens for Splunk webhook alerts about cron failures.
# Triggers the Cron-AIOps-Workflow (AI router -> approval -> dispatch).
- name: "Listen for RHEL cron alerts from Splunk"
  hosts: all

  sources:
    - name: "Webhook listener for RHEL cron events"
      ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: "Route cron failure through AI workflow"
      condition: event.payload.search_name == 'rhel-cron-failure'
      actions:
        - debug:
            msg: |
              Cron Alert Received from Splunk!
              Search Name: {{ event.payload.search_name }}
              Result: {{ event.payload.result | default('N/A') }}
              Routing through AI workflow...

        - run_workflow_template:
            name: "Cron-AIOps-Workflow"
            organization: "Default"
            job_args:
              extra_vars:
                alert_host: "{{ event.payload.result.host }}"
                alert_process: "{{ event.payload.result.process }}"
                alert_pid: "{{ event.payload.result.pid }}"
                alert_source: "{{ event.payload.result.source }}"
                alert_search_name: "{{ event.payload.search_name }}"
